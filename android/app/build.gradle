plugins {
    id "com.android.application"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('keystore.properties')

if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

dependencies {
    implementation "androidx.window:window:1.3.0"

}

android {
    namespace = "com.cloudcatcher.mars_launcher"
    compileSdk = 36

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    defaultConfig {
        applicationId = "com.cloudcatcher.mars_launcher"
        minSdk = 24
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName
        resValue "string", "app_name", "Mars Launcher"
    }

    signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword keystoreProperties['storePassword']
        }
    }


    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            applicationIdSuffix ".debug"
            resValue "string", "app_name", "Mars Launcher DEBUG"
        }
    }
}

flutter {
    source = '../..'
}

kotlin {
    compilerOptions {
        jvmTarget = org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17
    }
}

// Workaround for Flutter 3.44.x + AGP 8.9: the Flutter Gradle plugin copies the
// AOT Dart snapshot to build/app/intermediates/flutter/<variant>/jniLibs/<abi>/libapp.so
// but only wires it into the obsolete `merge<Variant>JniLibFolders` task. Current AGP
// merges native libs in `merge<Variant>NativeLibs`, which never sees libapp.so, so the
// release APK ships without a Dart VM snapshot and crashes at startup
// ("VM snapshot invalid"). The AAB path is unaffected. Force the ordering + input here.
android.applicationVariants.all { variant ->
    def capName = variant.name.capitalize()
    def flutterJniLibs = layout.buildDirectory.dir("intermediates/flutter/${variant.name}/jniLibs")
    android.sourceSets.getByName(variant.name).jniLibs.srcDir(flutterJniLibs)
    tasks.matching { it.name == "merge${capName}NativeLibs" }.configureEach {
        dependsOn("copyJniLibsflutterBuild${capName}")
    }
}
